{% extends "base.html" %}
{% block title %}Sign in — RoomSync{% endblock %}
{% block content %}
<div style="max-width:420px;margin:4rem auto;">
  <div class="card">
    <h2 style="margin-top:0;">Welcome to RoomSync</h2>
    <p style="color:var(--text-muted);">Enter your name to upload a dataset and view your history.</p>
    <form method="post">
      <div style="margin-bottom:1rem;">
        <input type="text" name="username" class="form-control" placeholder="Your name" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Continue</button>
    </form>
  </div>
</div>
{% endblock %}
